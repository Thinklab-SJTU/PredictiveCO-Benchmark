dataset:
  prob_version: gen
  # generate knapsack data
  generate_weight: True
  unit_weight: False
  # kfold: 5
  noise_level: 0
  noise_width: 0.5
  poly_deg: 4
  knapsack_dim: 1
  num_items: 20
  capacity: 100

models:
  spo:
    reduction: mean
  blackbox:
    reduction: mean
    lambd: 0.1
  identity:
    reduction: mean
  qptl:
    reduction: mean
  listLTR:
    reduction: mean
  pairLTR:
    reduction: mean
  pointLTR:
    reduction: mean
  nce:
    reduction: sum
  lodl:
    sampling: random
    quadrank: 20
    quadalpha: 0
    serial: True
    reduction: mean
  mse:
    reduction: mean
  msesum:
    alpha: 0.1
  ce:
    reduction: mean
  dfl:
    dflalpha: 0.1
    reduction: sum

solver:
  gurobi:
    kwargs: none
